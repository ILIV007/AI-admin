# ============================================================
# AI Admin — Cloudflare Worker configuration
# Version: v0.2.1
# ============================================================

name = "ai-admin"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV binding — configured by user.
[[kv_namespaces]]
binding = "SETTINGS"
id = "c8adbda37ee642d194adabf79f458f0d"

# ============================================================
# Environment Variables (non-secret)
# ============================================================
[vars]
ADMIN_ID = "126679582"
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# AI Provider: "openrouter" (default — works even when Gemini quota is exceeded)
DEFAULT_AI_PROVIDER = "openrouter"

# Gemini model (free tier)
GEMINI_MODEL = "gemini-2.0-flash"

# OpenRouter primary model (special auto-router — picks best available free model)
OPENROUTER_MODEL = "openrouter/free"

# OpenRouter FALLBACK models (comma-separated, ALL tried in parallel)
# These are user-verified free models from openrouter.ai/models (2025).
# If you see 404 errors in /debug → Test AI, visit https://openrouter.ai/models
# (filter by "Free") and update this list.
OPENROUTER_FALLBACK_MODELS = "openrouter/free,nvidia/nemotron-3-ultra-550b-a55b:free,nvidia/nemotron-3-super-120b-a12b:free,nvidia/nemotron-3-nano-30b-a3b:free,openai/gpt-oss-20b:free,google/gemma-4-31b-it:free,google/gemma-4-26b-a4b-it:free,qwen/qwen3-next-80b-a3b-instruct:free,cognitivecomputations/dolphin-mistral-24b-venice-edition:free,meta-llama/llama-3.2-3b-instruct:free,poolside/laguna-m.1:free"

# ============================================================
# Secrets (DO NOT put real values here — set via dashboard):
#   BOT_TOKEN          →  from @BotFather
#   GEMINI_API_KEY     →  from aistudio.google.com
#   OPENROUTER_API_KEY →  from openrouter.ai/keys
#   WEBHOOK_SECRET     →  optional, for webhook verification
#   DEBUG_TOKEN        →  optional, for /debug protection
# ============================================================
