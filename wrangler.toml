# ============================================================
# AI Admin — Cloudflare Worker configuration
# Version: v0.5.21
# ============================================================

name = "ai-admin"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV binding — configured by user.
[[kv_namespaces]]
binding = "SETTINGS"
id = "c8adbda37ee642d194adabf79f458f0d"

# v0.5.14: Cron trigger for SILENT scheduling fallback
# Primary: native Telegram schedule_date
# Fallback: if native fails (Telegram silently sends immediately),
#           KV cron queue sends the message at the scheduled time.
# The user sees "📅 Scheduled!" regardless of which method is used.
[triggers]
crons = ["* * * * *"]

# ============================================================
# Environment Variables (non-secret)
# ============================================================
[vars]
ADMIN_ID = "126679582"
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# v0.5.9 TASK 4: DEBUG_MODE — when "true", debug logs are written to KV.
# When "false" (default), logs only go to console.log (saves KV writes).
DEBUG_MODE = "false"

# AI Provider: "openrouter" (default — works even when Gemini quota is exceeded)
DEFAULT_AI_PROVIDER = "openrouter"

# Gemini model (free tier) — v0.5.19: Using gemini-3-flash-preview (newest)
# Fallback chain: gemini-3-flash-preview → gemini-2.5-flash → gemini-3.1-flash-lite-preview → gemini-2.5-flash-lite → gemini-2.0-flash
GEMINI_MODEL = "gemini-3-flash-preview"

# OpenRouter primary model — v0.5.20: Using llama-3.3-70b (best quality)
# Fallback chain: llama-3.3-70b → qwen3-next-80b → gemma-4-31b → gpt-oss-120b → hermes-3-405b → nemotron-ultra-550b
OPENROUTER_MODEL = "meta-llama/llama-3.3-70b-instruct:free"

# OpenRouter FALLBACK models (comma-separated, ALL tried in parallel via Promise.any)
# v0.5.20: Top 6 from user's list, ranked by quality
OPENROUTER_FALLBACK_MODELS = "meta-llama/llama-3.3-70b-instruct:free,qwen/qwen3-next-80b-a3b-instruct:free,google/gemma-4-31b-it:free,openai/gpt-oss-120b:free,nousresearch/hermes-3-llama-3.1-405b:free,nvidia/nemotron-3-ultra-550b-a55b:free"

# ============================================================
# Secrets (DO NOT put real values here — set via dashboard):
#   BOT_TOKEN          →  from @BotFather
#   GEMINI_API_KEY     →  from aistudio.google.com
#   OPENROUTER_API_KEY →  from openrouter.ai/keys
#   WEBHOOK_SECRET     →  optional, for webhook verification
#   DEBUG_TOKEN        →  optional, for /debug protection
# ============================================================
