# ============================================================
# AI Admin — Cloudflare Worker configuration
# Version: v0.2.1
# ============================================================

name = "ai-admin"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV binding — configured by user.
[[kv_namespaces]]
binding = "SETTINGS"
id = "c8adbda37ee642d194adabf79f458f0d"

# ============================================================
# Environment Variables (non-secret)
# ============================================================
[vars]
ADMIN_ID = "126679582"
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# AI Provider: "openrouter" (default — works even when Gemini quota is exceeded)
DEFAULT_AI_PROVIDER = "openrouter"

# Gemini model (free tier)
GEMINI_MODEL = "gemini-2.0-flash"

# OpenRouter primary model (tried first)
OPENROUTER_MODEL = "meta-llama/llama-3.3-70b-instruct:free"

# OpenRouter FALLBACK models (comma-separated, ALL tried in parallel)
# These are FREE models verified working as of 2025.
# OpenRouter changes free model availability frequently — if you see 404 errors
# in /debug → Test AI, update this list with currently-available free models
# from https://openrouter.ai/models (filter by "Free")
OPENROUTER_FALLBACK_MODELS = "meta-llama/llama-3.3-70b-instruct:free,deepseek/deepseek-r1:free,google/gemini-2.5-pro-exp-03-25:free,qwen/qwen-2.5-coder-32b-instruct:free,mistralai/mistral-nemo:free,google/gemma-2-9b-it:free,microsoft/phi-3-medium-4k-instruct:free,openchat/openchat-7b:free,huggingfaceh4/zephyr-7b-beta:free"

# ============================================================
# Secrets (DO NOT put real values here — set via dashboard):
#   BOT_TOKEN          →  from @BotFather
#   GEMINI_API_KEY     →  from aistudio.google.com
#   OPENROUTER_API_KEY →  from openrouter.ai/keys
#   WEBHOOK_SECRET     →  optional, for webhook verification
#   DEBUG_TOKEN        →  optional, for /debug protection
# ============================================================
