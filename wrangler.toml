# ============================================================
# AI Admin v0.4.5 — Cloudflare Worker configuration
# ============================================================

name = "ai-admin"
main = "src/index.js"
compatibility_date = "2026-08-01"
compatibility_flags = ["nodejs_compat"]

# KV binding — configured by user.
[[kv_namespaces]]
binding = "SETTINGS"
id = "c8adbda37ee642d194adabf79f458f0d"

# ============================================================
# Environment Variables (non-secret)
# ============================================================
[vars]
ADMIN_ID = "126679582"
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# AI Provider: "openrouter" (default — works even when Gemini quota is exceeded)
DEFAULT_AI_PROVIDER = "openrouter"

# Gemini model (free tier)
GEMINI_MODEL = "gemini-2.5-flash"

# OpenRouter primary model (fastest verified)
OPENROUTER_MODEL = "nvidia/nemotron-3-nano-30b-a3b:free"

# OpenRouter FALLBACK models (comma-separated, ALL raced in parallel via Promise.any)
OPENROUTER_FALLBACK_MODELS = "nvidia/nemotron-3-nano-30b-a3b:free,nvidia/nemotron-3-super-120b-a12b:free,google/gemma-4-31b-it:free,openai/gpt-oss-20b:free,google/gemma-4-26b-a4b-it:free,nvidia/nemotron-3-ultra-550b-a55b:free,openrouter/free,qwen/qwen3-next-80b-a3b-instruct:free,cognitivecomputations/dolphin-mistral-24b-venice-edition:free,meta-llama/llama-3.2-3b-instruct:free,poolside/laguna-m.1:free"

# ============================================================
# Secrets (set via Cloudflare dashboard or wrangler secret):
#   BOT_TOKEN          →  from @BotFather
#   GEMINI_API_KEY     →  from aistudio.google.com
#   OPENROUTER_API_KEY →  from openrouter.ai/keys
#   WEBHOOK_SECRET     →  optional, for webhook verification
#   DEBUG_TOKEN        →  optional, for /debug protection
# ============================================================
