# ============================================================
# AI Admin — Cloudflare Worker configuration
# Version: v0.2.1
# ============================================================

name = "ai-admin"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV binding — configured by user.
[[kv_namespaces]]
binding = "SETTINGS"
id = "c8adbda37ee642d194adabf79f458f0d"

# ============================================================
# Environment Variables (non-secret)
# ============================================================
[vars]
ADMIN_ID = "126679582"
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# AI Provider: "openrouter" (default — works even when Gemini quota is exceeded)
DEFAULT_AI_PROVIDER = "openrouter"

# Gemini model (free tier)
GEMINI_MODEL = "gemini-2.0-flash"

# OpenRouter primary model (tried first)
OPENROUTER_MODEL = "google/gemini-2.0-flash-exp:free"

# OpenRouter FALLBACK models (comma-separated, ALL tried in parallel)
# These are FREE models ranked by: speed, quality, and Persian/multilingual support.
# If one is rate-limited (429), others will still work.
# Add/remove models as you like — see https://openrouter.ai/models for more.
OPENROUTER_FALLBACK_MODELS = "google/gemini-2.0-flash-exp:free,qwen/qwen-2.5-72b-instruct:free,meta-llama/llama-3.3-70b-instruct:free,deepseek/deepseek-chat-v3-0324:free,mistralai/mistral-7b-instruct:free,nousresearch/hermes-3-llama-3.1-405b:free"

# ============================================================
# Secrets (DO NOT put real values here — set via dashboard):
#   BOT_TOKEN          →  from @BotFather
#   GEMINI_API_KEY     →  from aistudio.google.com
#   OPENROUTER_API_KEY →  from openrouter.ai/keys
#   WEBHOOK_SECRET     →  optional, for webhook verification
#   DEBUG_TOKEN        →  optional, for /debug protection
# ============================================================
